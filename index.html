<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品力内容生产</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f6;color:#31333f;min-height:100vh}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:270px;flex-shrink:0;background:#fff;border-right:1px solid #e6e6e6;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sidebar h3{font-size:14px;font-weight:700;margin:12px 0 8px;color:#31333f}
.sidebar h3:first-child{margin-top:0}
.sidebar label{font-size:12px;font-weight:600;display:block;margin-bottom:3px;color:#555}
.sidebar input,.sidebar select{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;margin-bottom:10px;background:#fff}
.sidebar input:focus,.sidebar select:focus{outline:none;border-color:#ff4b4b}
.badge{padding:5px 10px;border-radius:6px;font-size:12px;margin-bottom:10px}
.badge.ok{background:#dcfce7;color:#166534}
.badge.warn{background:#fef9c3;color:#854d0e}
.divider{border:none;border-top:1px solid #eee;margin:8px 0}
.sidebar-footer{font-size:12px;color:#888;margin-top:4px}
.clear-btn{width:100%;padding:7px;background:#fff;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:13px;margin-top:4px}
.clear-btn:hover{background:#f9fafb}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e6e6e6;padding:0 24px}
.tab{padding:12px 18px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;color:#666;user-select:none}
.tab.active{border-bottom-color:#ff4b4b;color:#ff4b4b;font-weight:600}
.tab-pane{display:none;padding:24px;overflow-y:auto;flex:1}
.tab-pane.active{display:block}

h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}

.two-col{display:grid;grid-template-columns:1.1fr 0.9fr;gap:24px;margin-bottom:20px}
.col-title{font-size:15px;font-weight:700;margin-bottom:3px}
.col-sub{font-size:12px;color:#888;margin-bottom:12px}
.field-label{font-size:13px;font-weight:500;display:block;margin-bottom:4px}
textarea{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;resize:vertical;font-family:inherit;line-height:1.5}
textarea:focus{outline:none;border-color:#ff4b4b}
.sep{border:none;border-top:1px solid #eee;margin:16px 0}

.gen-btn{width:100%;padding:11px;background:#ff4b4b;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.gen-btn:hover{background:#e03e3e}
.gen-btn:disabled{background:#ccc;cursor:not-allowed}

/* Output */
.out-title{font-size:15px;font-weight:700;margin-bottom:10px}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:10px}
.alert.info{background:#eff6ff;color:#1e40af}
.alert.success{background:#dcfce7;color:#166534}
.alert.error{background:#fee2e2;color:#991b1b}
.stream-box{min-height:80px;padding:14px;background:#fff;border:1px solid #e6e6e6;border-radius:8px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}

details{margin-top:12px}
summary{cursor:pointer;font-size:13px;font-weight:600;padding:6px 0;color:#374151}
.copy-wrap{position:relative;margin-top:8px}
.code-box{background:#f6f8fa;border:1px solid #e0e0e0;border-radius:6px;padding:12px 40px 12px 12px;font-size:13px;font-family:monospace;white-space:pre-wrap;word-break:break-word}
.copy-btn{position:absolute;top:8px;right:8px;background:#fff;border:1px solid #d1d5db;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px}
.copy-btn:hover{background:#f3f4f6}

/* History */
.hist-item{border:1px solid #e6e6e6;border-radius:8px;margin-bottom:10px;overflow:hidden}
.hist-head{padding:11px 16px;background:#f9fafb;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.hist-head:hover{background:#f3f4f6}
.hist-body{display:none;padding:16px;font-size:13px;line-height:1.7;border-top:1px solid #e6e6e6}
.hist-body.open{display:block}
.hist-result{white-space:pre-wrap;word-break:break-word}
.empty{color:#9ca3af;font-size:14px;padding:16px 0}

@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid #e6e6e6}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <h3>⚙️ 配置</h3>
  <label>Futu AI Key</label>
  <input type="password" id="apiKey" placeholder="user-key-..." oninput="onKeyInput()">
  <div class="badge warn" id="keyBadge">请输入 API Key 后使用</div>

  <hr class="divider">
  <h3>📐 生成参数</h3>

  <label>TA（目标客群）</label>
  <select id="ta">
    <option>熟手（中低风险偏好）</option>
    <option>熟手（中高风险偏好）</option>
    <option>华人</option>
  </select>

  <label>发布平台</label>
  <select id="platform" onchange="onPlatformChange()">
    <option>moomoo社区</option>
    <option>小红书</option>
    <option>Reddit</option>
    <option>X</option>
    <option>通用文案</option>
  </select>

  <label>语气调整</label>
  <select id="tone">
    <option>保持原样</option>
    <option>活泼有趣</option>
    <option>真诚温暖</option>
    <option>专业干货</option>
    <option>幽默搞笑</option>
  </select>

  <label>字数参考</label>
  <select id="length">
    <option>保持原样</option>
    <option>短（100 字以内）</option>
    <option>中（200-400 字）</option>
    <option>长（400 字以上）</option>
  </select>

  <hr class="divider">
  <div class="sidebar-footer" id="histCount">已生成 0 条记录</div>
  <button class="clear-btn" onclick="clearHistory()">🗑️ 清空历史</button>
</div>

<!-- Main -->
<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('write',this)">✍️ 内容生产</div>
    <div class="tab" onclick="switchTab('history',this)">📚 历史记录</div>
  </div>

  <!-- Write -->
  <div class="tab-pane active" id="pane-write">
    <h1>✍️ AI 产品力内容生产</h1>
    <p class="sub">给我示例文案 + 你的要求，AI 帮你生成新内容</p>

    <div class="two-col">
      <div>
        <div class="col-title">📝 示例文案（可选）</div>
        <div class="col-sub">粘贴 1-3 篇风格参考，越多越准确；不填则 AI 按平台 & TA 理解直接创作</div>
        <label class="field-label">示例 1</label>
        <textarea id="ex1" rows="6" placeholder="粘贴你最喜欢、风格最典型的一篇参考文案..."></textarea>
        <label class="field-label">示例 2（可选）</label>
        <textarea id="ex2" rows="4" placeholder="再粘贴一篇，帮 AI 更好理解你的风格偏好"></textarea>
        <label class="field-label">示例 3（可选）</label>
        <textarea id="ex3" rows="4" placeholder="第三篇示例（可选）"></textarea>
      </div>
      <div>
        <div class="col-title">🎯 内容需求</div>
        <div class="col-sub">描述你想创作的内容</div>
        <label class="field-label">内容要求 *</label>
        <textarea id="req" rows="11" placeholder="描述你的内容主题和关键信息..."></textarea>
        <hr class="sep">
        <button class="gen-btn" id="genBtn" onclick="generate()">🚀 开始生产</button>
      </div>
    </div>

    <hr class="sep">
    <div id="output"></div>
  </div>

  <!-- History -->
  <div class="tab-pane" id="pane-history">
    <div id="histList"><p class="empty">暂无历史记录。完成内容生产后会自动保存到这里。</p></div>
  </div>
</div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PROXY = '/api/generate';

const SYSTEM_PROMPT = `你是一个专业的内容创作专家，精通各类平台的文案写作风格，包括：小红书、微博、朋友圈、公众号，以及 moomoo 投资社区（英文金融内容）。

你的仿写能力体现在：
• 精准识别：语气、节奏、句式长短、段落结构
• 手法复现：排比、反问、emoji 使用习惯、标点风格
• 平台适配：理解不同平台的内容规律和用户习惯
• 创意独立：风格相似，内容 100% 原创，绝不重复示例

黄金法则：形神兼备，内容全新。

【语言规则】默认使用英文输出。仅当平台规范、示例文案或用户要求中明确指定中文时，才使用中文。`;

const PLATFORM_GUIDE = {
  'moomoo社区': `【moomoo 社区平台风格规范】
moomoo 是面向全球散户的投资交易平台，社区内容以英文为主，主要涵盖市场资讯、交易技巧、平台功能介绍。
核心风格特征：
1. 开篇称呼：固定以 "Dear mooers," 开场
2. 语气：专业友好（professional yet approachable）
3. 结构：痛点导入 → 解决方案 → 操作步骤（① ② ③）→ 社区互动 CTA
4. Emoji：金融相关适度点缀，如 📈 💡 ✅ 🎉 💰
5. 段落：短段（3-5 行），加粗标题分层
6. 结尾：互动邀请 + 风险免责（"Investments involve risk. Please trade responsibly."）
7. 语言：全文英文`,
  'Reddit': `【Reddit 平台风格规范】
核心风格：真实坦诚，数据/案例优先，避免硬广。
1. 标题：具体有信息量，能独立传递核心观点
2. 正文：开门见山，善用 Markdown（## **加粗** > 引用 - 列表）
3. Emoji：极少使用
4. 禁忌：不能出现"立即下载/注册"等 CTA，如提及平台需以第一人称经验带出
5. 结尾：抛一个问题引发讨论
6. 语言：全文英文`,
  'X': `【X（原 Twitter）平台风格规范】
1. 单条推文：≤ 280 字符，首句即 hook
2. 串推：格式 "1/" "2/" ... 结尾总结
3. 语气：自信直接，FinTwit KOL 风格
4. 内容节奏：短句，多用数字
5. Emoji：每条 1-3 个，📊 📈 🔥 💡 ⚡ 🧵
6. Hashtags：2-3 个精准标签
7. 语言：全文英文`,
};

const TA_PROFILE = {
  '熟手（中高风险偏好）': `【目标客群：熟手（中高风险偏好）——P0 核心创收主力】
年龄 25-42，进阶交易者，期权渗透深，ARPU 极高。
核心痛点："看得到机会，却受制于工具"
关键卖点：专业期权链、Strategy Builder、Level 2/IV/Expected Move、极速执行。
沟通方向：强调专业度、执行速度和掌控感。`,
  '华人': `【目标客群：华人客群——P0 高净值基本盘】
年龄 28-50，资产体量大，重视安全感与中文服务。
核心痛点："信息获取与工具门槛的错位"
关键卖点：专业工具 + 7×24 中文服务 + Cash Sweep + IPO/财报抓手。
沟通方向：强调安全感、中文服务、一站式便利。`,
  '熟手（中低风险偏好）': `【目标客群：熟手（中低风险偏好）——P1 长期资产压舱石】
年龄 30-55，"研究后下单"型，持有 IRA/401k，AUM 极高。
核心痛点："决策成本太高"
关键卖点：一站式分析（Yahoo Finance + TradingView + Seeking Alpha）、Smart Money、Cash Sweep、Moomoo AI。
沟通方向：强调省时省力、全局掌控、决策清晰。`,
};

const TONE_MAP = {
  '保持原样':'与示例保持一致','活泼有趣':'活泼、俏皮、充满活力',
  '真诚温暖':'真诚、温暖、感性细腻','专业干货':'专业、理性、有说服力','幽默搞笑':'幽默、搞笑、接地气'
};
const LENGTH_MAP = {
  '保持原样':'篇幅与示例相近','短（100 字以内）':'控制在 100 字以内，精炼',
  '中（200-400 字）':'200-400 字，详略得当','长（400 字以上）':'400 字以上，内容丰富充实'
};
const PLACEHOLDER_MAP = {
  'moomoo社区':`Topic: Introduce moomoo's Earnings Hub feature\nKey info: AI summaries, volatility analysis, peer benchmarking\nCTA: Comment to win up to 1,000 points`,
  '小红书':`主题：分享我用 moomoo 做期权交易的心得\n关键信息：操作简单、数据全、有 AI 辅助\n目标读者：想入门期权的年轻投资者`,
  'Reddit':`Topic: Share a trading strategy or platform experience\nKey info: Specific data, personal experience, honest pros/cons\nSubreddit: r/options or r/investing`,
  'X':`Topic: A sharp market insight or trading tip\nFormat: Thread (1/N) or single punchy tweet\nTone: Confident, direct, FinTwit style`,
  '通用文案':`描述你的内容主题和关键信息即可，AI 会生成通用风格的文案。\n\n例如：介绍 moomoo 的 Cash Sweep 功能，强调闲钱自动生息、随时可取`,
};

// ── State ────────────────────────────────────────────────────────────────────
let history = [];

// ── Build prompt ─────────────────────────────────────────────────────────────
function buildPrompt(examples, req, platform, tone, length, ta) {
  const hasEx = examples.some(e => e.trim());
  const pg = PLATFORM_GUIDE[platform] ? `\n${PLATFORM_GUIDE[platform]}\n` : '';
  const tp = TA_PROFILE[ta] ? `\n${TA_PROFILE[ta]}\n` : '';
  const taLine = ta ? `👥 目标客群（TA）：${ta}\n` : '';

  let intro, exSec, fmt;
  if (hasEx) {
    let exBlock = '';
    examples.forEach((e,i) => { if(e.trim()) exBlock += `\n---【示例 ${i+1}】---\n${e.trim()}\n`; });
    intro = '请分析以下示例文案的写作风格，然后根据要求进行仿写。';
    exSec = `\n===【示例文案】===\n${exBlock}`;
    fmt = `**📊 风格分析**\n（提炼 3 个最核心的风格特征，每条一行）\n\n---\n\n**✨ 仿写结果**\n（直接输出正文内容，不加任何说明。注意：此标题行必须原样保留，内容语言按平台规范输出）`;
  } else {
    intro = '没有示例文案，请根据平台规范、目标客群画像和内容需求，凭借你对该平台的深度理解直接创作一篇高质量内容。';
    exSec = '';
    fmt = `**✨ 仿写结果**\n（直接输出正文内容，不加任何说明。注意：此标题行必须原样保留，内容语言按平台规范输出）`;
  }

  return `${intro}\n${pg}${tp}${exSec}\n===【内容需求】===\n📱 发布平台：${platform}\n${taLine}📋 内容主题 / 要求：${req}\n🎨 语气风格：${TONE_MAP[tone]||tone}\n📏 字数参考：${LENGTH_MAP[length]||length}\n\n===【输出格式】===\n请严格按以下格式输出，不要省略任何部分：\n\n${fmt}`;
}

function extractResult(text) {
  for (const m of ['仿写结果','生产结果','Imitation Result','Generated Content','Result']) {
    if (text.includes(m)) return text.split(m)[1].replace(/^[\*\n \-—]+/,'').trim();
  }
  if (text.includes('\n---\n')) return text.split('\n---\n')[1].trim();
  return text.trim();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  const b = document.getElementById('keyBadge');
  b.className = k ? 'badge ok' : 'badge warn';
  b.textContent = k ? '✅ API Key 已设置' : '请输入 API Key 后使用';
}

function onPlatformChange() {
  const p = document.getElementById('platform').value;
  document.getElementById('req').placeholder = PLACEHOLDER_MAP[p] || '描述你的内容主题和关键信息...';
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if (name === 'history') renderHistory();
}

function clearHistory() {
  history = [];
  document.getElementById('histCount').textContent = '已生成 0 条记录';
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('histList');
  if (!history.length) { el.innerHTML = '<p class="empty">暂无历史记录。完成内容生产后会自动保存到这里。</p>'; return; }
  el.innerHTML = history.map((h,i) => `
    <div class="hist-item">
      <div class="hist-head" onclick="toggleHist(${i})">
        <span>[${h.time}] ${h.platform} · ${h.ta} · ${h.tone} | ${h.req}</span><span>▼</span>
      </div>
      <div class="hist-body" id="hb${i}">
        <div class="hist-result">${esc(h.full)}</div>
        <hr style="margin:12px 0;border:none;border-top:1px solid #eee">
        <p style="font-size:12px;color:#888;margin-bottom:6px">📋 仅生产结果</p>
        <div class="copy-wrap"><div class="code-box">${esc(h.copy)}</div><button class="copy-btn" onclick="doCopy(${i})">复制</button></div>
      </div>
    </div>`).join('');
}

function toggleHist(i) { document.getElementById('hb'+i).classList.toggle('open'); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function doCopy(i){ navigator.clipboard.writeText(history[i].copy).then(()=>{ const b=document.querySelectorAll('.copy-btn')[i]; b.textContent='已复制 ✓'; setTimeout(()=>b.textContent='复制',2000); }); }
function nowStr(){ const d=new Date(); return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const examples = ['ex1','ex2','ex3'].map(id => document.getElementById(id).value);
  const req = document.getElementById('req').value.trim();
  const platform = document.getElementById('platform').value;
  const tone = document.getElementById('tone').value;
  const length = document.getElementById('length').value;
  const ta = document.getElementById('ta').value;
  const out = document.getElementById('output');

  if (!apiKey) { out.innerHTML = '<div class="alert error">⚠️ 请在左侧边栏输入 Futu AI Key</div>'; return; }
  if (!req) { out.innerHTML = '<div class="alert error">⚠️ 请填写内容需求</div>'; return; }

  document.getElementById('genBtn').disabled = true;
  out.innerHTML = `<div class="out-title">✨ 生产结果</div>
    <div class="alert info" id="statusMsg">🤔 AI 正在分析风格，请稍候…</div>
    <div class="stream-box" id="streamBox"></div>`;

  const userMsg = buildPrompt(examples, req, platform, tone, length, ta);
  const streamBox = document.getElementById('streamBox');
  const statusMsg = document.getElementById('statusMsg');
  let fullText = '';

  try {
    const resp = await fetch(PROXY, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        apiKey,
        model: 'claude-opus-4-6',
        max_tokens: 4096,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: userMsg },
        ],
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const evt = JSON.parse(data);
          const chunk = evt.choices?.[0]?.delta?.content;
          if (chunk) {
            fullText += chunk;
            streamBox.textContent = fullText;
          }
        } catch(_) {}
      }
    }

    statusMsg.className = 'alert success';
    statusMsg.textContent = '✅ 内容生产完成！';

    const copyText = extractResult(fullText);
    out.innerHTML += `<details style="margin-top:12px"><summary>📋 点击展开 / 复制生产结果</summary>
      <div class="copy-wrap">
        <div class="code-box" id="copyBox">${esc(copyText)}</div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('copyBox').textContent).then(()=>{this.textContent='已复制 ✓';setTimeout(()=>this.textContent='复制',2000)})">复制</button>
      </div>
      <p style="font-size:12px;color:#888;margin-top:6px">点击「复制」按钮即可复制</p>
    </details>`;

    const reqShort = req.slice(0,60) + (req.length>60?'…':'');
    history.unshift({ time:nowStr(), platform, ta, tone, req:reqShort, full:fullText, copy:copyText });
    document.getElementById('histCount').textContent = `已生成 ${history.length} 条记录`;

  } catch(e) {
    statusMsg.className = 'alert error';
    if (e.message.includes('401')) statusMsg.textContent = '❌ API Key 无效，请检查密钥是否正确';
    else if (e.message.includes('429')) statusMsg.textContent = '❌ 请求频率过高，请稍等片刻再试';
    else statusMsg.textContent = `❌ 发生错误：${e.message}`;
  } finally {
    document.getElementById('genBtn').disabled = false;
  }
}

// Init
onPlatformChange();
</script>
</body>
</html>
